<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Explore our expert custom tailoring services: Indian suits, blouses, sarees, lehengas, alterations, and ethnic wear. Professional tailoring at affordable prices in Lakhimpur Kheri.">
    <meta name="keywords" content="custom tailoring, Indian suits, salwar kameez, blouse stitching, saree tailoring, lehenga stitching, alterations, ethnic wear">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://nikkusinghaidan1.github.io/shakti-boutique/services.html">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Shakti Boutique</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="products.html">Ready-made Kurtis</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <section class="welcome">
        <div class="container">
            <h1>Our Custom Tailoring Services</h1>
            <p>Expert tailoring for all your fashion needs with precision and care</p>
        </div>
    </section>

    <section class="container" style="padding: 2rem 0;">
        <div class="product-grid" id="servicesGrid">
            <!-- Services will be loaded here -->
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Shakti Boutique. All rights reserved.</p>
            <p>Phone: 9795478483 | Ladies Tailor in Lakhimpur Kheri</p>
        </div>
    </footer>

    <script>
        const defaultServices = [
            {
                id: 1,
                name: "Indian Suit (Salwar Kameez)",
                price: "₹500 - ₹1200",
                description: "Custom tailored Indian suits with perfect fit. Choose from various fabrics and designs.",
                image: "👗"
            },
            {
                id: 2,
                name: "Blouse Stitching",
                price: "₹300 - ₹600",
                description: "Expert blouse stitching with trendy designs. Back designs, boat neck, deep neck, etc.",
                image: "👚"
            },
            {
                id: 3,
                name: "Saree Stitching",
                price: "₹400 - ₹800",
                description: "Professional saree stitching and fitting. We handle all types of sarees.",
                image: "🧣"
            },
            {
                id: 4,
                name: "Alterations",
                price: "₹200 - ₹500",
                description: "Expert alterations for perfect fit. Hemming, taking in/letting out, etc.",
                image: "✂️"
            },
            {
                id: 5,
                name: "Lehenga Stitching",
                price: "₹800 - ₹2000",
                description: "Beautiful custom lehengas for special occasions and weddings.",
                image: "👑"
            },
            {
                id: 6,
                name: "Ethnic Wear",
                price: "₹600 - ₹1500",
                description: "Custom ethnic wear including kurtis, palazzo sets, and traditional outfits.",
                image: "🎨"
            }
        ];

        function loadServices() {
            const servicesGrid = document.getElementById('servicesGrid');
            const services = JSON.parse(localStorage.getItem('services')) || defaultServices;
            
            servicesGrid.innerHTML = services.map(service => `
                <div class="product-card">
                    <div class="product-image">${service.image}</div>
                    <div class="product-info">
                        <h3>${service.name}</h3>
                        <div class="product-price">${service.price}</div>
                        <p class="product-description">${service.description}</p>
                    </div>
                </div>
            `).join('');
        }

        loadServices();
    </script>
</body>
</html>
